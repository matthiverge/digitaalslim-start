const scene = document.getElementById('scene');
const total = files.length;

// Spiral/fan layout
const vw = window.innerWidth;
const vh = window.innerHeight;
const centerX = vw / 2;
const centerY = vh / 2;

// Card sizes - variety
const sizes = [
  { w: 220, h: 80 },
  { w: 240, h: 90 },
  { w: 200, h: 75 },
  { w: 260, h: 95 },
  { w: 180, h: 70 },
];

// Seeded random for consistency
function seeded(i) {
  let x = Math.sin(i * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

files.forEach((file, i) => {
  const div = document.createElement('div');
  div.className = 'card';
  
  const img = document.createElement('img');
  img.src = 'afbeeldingen/Testimonials/' + encodeURIComponent(file);
  img.loading = 'lazy';
  img.alt = file;
  div.appendChild(img);
  
  // Spiral placement
  const angle = (i / total) * Math.PI * 6 + seeded(i) * 0.5;
  const radius = 60 + (i / total) * (Math.min(vw, vh) * 0.44);
  const size = sizes[i % sizes.length];
  
  const x = centerX + Math.cos(angle) * radius - size.w / 2;
  const y = centerY + Math.sin(angle) * radius - size.h / 2;
  const rotation = (angle * 180 / Math.PI) + (seeded(i + 50) - 0.5) * 30;
  
  div.style.width = size.w + 'px';
  div.style.height = size.h + 'px';
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  div.style.transform = 'rotate(' + rotation + 'deg)';
  div.style.zIndex = i;
  
  scene.appendChild(div);
});
