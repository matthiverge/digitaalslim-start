<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>139 Testimonials - DigitaalSlim Plus+</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0A0814;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  font-family: "Inter", -apple-system, sans-serif;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  height: 100dvh;
}

.card {
  position: absolute;
  border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  overflow: hidden;
  border: 1.5px solid rgba(255,255,255,0.05);
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
  cursor: pointer;
}

.card.go {
  transition: left 1.1s cubic-bezier(0.22, 1, 0.36, 1),
              top 1.1s cubic-bezier(0.22, 1, 0.36, 1),
              width 1.1s cubic-bezier(0.22, 1, 0.36, 1),
              height 1.1s cubic-bezier(0.22, 1, 0.36, 1),
              transform 1.1s cubic-bezier(0.22, 1, 0.36, 1),
              opacity 0.6s ease;
}

.card img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

/* Desktop hover - only for pointer devices */
@media (hover: hover) and (pointer: fine) {
  .card.exploded:hover {
    z-index: 9999 !important;
    transform: scale(2.2) !important;
    box-shadow: 0 20px 60px rgba(74,44,245,0.3), 0 8px 24px rgba(0,0,0,0.5);
    border-color: rgba(240,180,41,0.35);
    transition: transform 0.3s cubic-bezier(0.34, 1.4, 0.64, 1), box-shadow 0.3s ease !important;
  }
}

.tap-prompt {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10001;
  text-align: center;
  pointer-events: none;
  transition: opacity 0.6s ease, bottom 0.6s ease;
}
.tap-prompt.hidden { opacity: 0; pointer-events: none; }
.tap-prompt-text {
  font-size: 20px;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

/* Hint after explosion */
.read-hint {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10001;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s ease 1.5s;
}
.read-hint.show { opacity: 1; }
.read-hint-text {
  font-size: 16px;
  font-weight: 500;
  color: rgba(255,255,255,0.55);
  background: rgba(10,8,20,0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 10px 24px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* Popup */
.popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 90000;
  background: rgba(10,8,20,0.8);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.popup-overlay.show { display: flex; }
.popup-overlay img {
  max-width: 90vw;
  max-height: 80vh;
  border-radius: 16px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 2px rgba(240,180,41,0.3);
  object-fit: contain;
}
.popup-close {
  position: absolute;
  top: 20px;
  right: 24px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.counter {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10000;
  text-align: center;
  pointer-events: none;
}
.counter-number {
  font-size: 72px;
  font-weight: 900;
  letter-spacing: -3px;
  line-height: 1;
  background: linear-gradient(135deg, #F0B429 0%, #FFD770 50%, #F0B429 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 12px rgba(240,180,41,0.3));
}
.counter-label {
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
}

/* Switcher */
.switcher {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 99999;
  display: none;
  gap: 4px;
  background: rgba(10,8,20,0.9);
  border: 2px solid rgba(240,180,41,0.3);
  border-radius: 999px;
  padding: 4px;
}
.switcher.show { display: flex; }
.switcher button {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.45);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
}
.switcher button.active {
  background: rgba(240,180,41,0.18);
  color: #F0B429;
}
</style>
</head>
<body>

<div class="switcher" id="switcher">
  <button data-layout="explosion" class="active">Explosie</button>
  <button data-layout="spiral">Spiraal</button>
  <button data-layout="mosaic">Mozaiek</button>
  <button data-layout="wave">Golf</button>
</div>

<div class="scene" id="scene"></div>

<div class="tap-prompt" id="tapPrompt">
  <div class="tap-prompt-text">Tik op de stapel om ze te ontdekken</div>
</div>

<div class="read-hint" id="readHint">
  <div class="read-hint-text">Tik op een ervaring om deze te lezen</div>
</div>

<div class="popup-overlay" id="popup">
  <div class="popup-close" id="popupClose">&times;</div>
  <img id="popup-img" src="" alt="">
</div>

<div class="counter">
  <div class="counter-number">139</div>
  <div class="counter-label">tevreden leden vertellen hun verhaal</div>
</div>

<script>

ity - Gina.png","106. Ervaring Community - Carine.png","107. Ervaring Community - Laura.png","108. Ervaring Community - Rudi.png","109. Ervaring Community - Diana.png","110. Ervaring Community - Rosette.png","111. Ervaring Community - Hilde N.png","112. Ervaring Community - Nele.png","113. Ervaring Community - Nicole Sm2.png","114. Ervaring Community - Henry.png","115. Ervaring Community - Leonie.png","116. Ervaring Community - Lut.png","117. Ervaring Community - Rita.png","118. Ervaring Community - Valerie.png","119. Ervaring Community - Marc.png","120. Ervaring Community - Rudi T.png","121. Ervaring Community - Ingrid.png","122. Ervaring Community - Patricia B.png","123. Ervaring Community - Anne-Mieke.png","124. Ervaring Community - Chris GB.png","125. Ervaring Community - Luc H.png","126. Ervaring Community - Nadine L.png","127. Ervaring Community - Linda V.png","128. Ervaring Community - Therese.png","129. Ervaring Community - Tiny S.png","130. Ervaring Community - Linda VH.png","131. Ervaring Community - Myriam B.png","132. Ervaring Community - Aurel.png","133. Ervaring Community - Etty.png","134. Ervaring Community - Christiane.png","135. Ervaring Community - Mieke N.png","136. Ervaring Community - Francine D.png","137. Ervaring Community - Sabine C.png","138. Ervaring Community - Anita VG.png","139. Ervaring Community - Bernard C.png"];

var scene = document.getElementById('scene');
var popup = document.getElementById('popup');
var popupImg = document.getElementById('popup-img');
var tapPrompt = document.getElementById('tapPrompt');
var readHint = document.getElementById('readHint');
var switcherEl = document.getElementById('switcher');
var total = files.length;
var vw = window.innerWidth;
var vh = window.innerHeight;
var cx = vw / 2;
var cy = vh / 2;
var exploded = false;
var currentLayout = 'explosion';

function s1(i){var x=Math.sin(i*127.1+311.7)*43758.5453;return x-Math.floor(x);}
function s2(i){var x=Math.sin(i*269.5+183.3)*23421.6312;return x-Math.floor(x);}

// Popup
document.getElementById('popupClose').addEventListener('click',function(e){e.stopPropagation();popup.classList.remove('show');});
popup.addEventListener('click',function(){popup.classList.remove('show');});

// Create cards stacked
var cards=[];
files.forEach(function(file,i){
  var div=document.createElement('div');
  div.className='card';
  var img=document.createElement('img');
  var src='afbeeldingen/Testimonials/'+encodeURIComponent(file);
  img.src=src;
  img.loading=(i<30)?'eager':'lazy';
  div.appendChild(img);
  var stackW=200,stackH=70;
  div.style.width=stackW+'px';
  div.style.height=stackH+'px';
  div.style.left=(cx-stackW/2+(s1(i)-0.5)*40)+'px';
  div.style.top=(cy-stackH/2+(s2(i)-0.5)*40)+'px';
  div.style.transform='rotate('+((s1(i+3)-0.5)*30)+'deg)';
  div.style.zIndex=i;
  div.style.opacity='0.85';
  div.setAttribute('data-src',src);
  div.addEventListener('click',function(e){
    if(!exploded)return;
    e.stopPropagation();
    popupImg.src=this.getAttribute('data-src');
    popup.classList.add('show');
    readHint.classList.remove('show');
  });
  scene.appendChild(div);
  cards.push(div);
});

// Layouts
var layouts={
  explosion:function(i){
    var angle=s1(i)*Math.PI*2;
    var dist=30+Math.pow(s2(i),0.65)*(Math.min(vw,vh)*0.48);
    var w=140+s1(i+10)*120;
    var h=52+s1(i+10)*42;
    return{x:cx+Math.cos(angle)*dist-w/2+(s1(i+30)-0.5)*50,y:cy+Math.sin(angle)*dist-h/2+(s1(i+40)-0.5)*50,w:w,h:h,rot:(s1(i+20)-0.5)*55};
  },
  spiral:function(i){
    var angle=(i/total)*Math.PI*7+s1(i)*0.3;
    var radius=20+(i/total)*(Math.min(vw,vh)*0.47);
    var w=185+s1(i)*65;
    var h=62+s1(i)*28;
    return{x:cx+Math.cos(angle)*radius-w/2,y:cy+Math.sin(angle)*radius-h/2,w:w,h:h,rot:(angle*180/Math.PI)*0.6+(s1(i+50)-0.5)*25};
  },
  mosaic:function(i){
    var cols=Math.ceil(Math.sqrt(total*(vw/vh)));
    var rows=Math.ceil(total/cols);
    var col=i%cols,row=Math.floor(i/cols);
    var cW=vw/cols,cH=(vh-50)/rows;
    var w=cW*0.96,h=cH*0.93;
    return{x:col*cW+(cW-w)/2+(s1(i)-0.5)*cW*0.08,y:row*cH+(cH-h)/2+(s2(i)-0.5)*cH*0.08+25,w:w,h:h,rot:(s1(i+5)-0.5)*5};
  },
  wave:function(i){
    var cols=Math.round(Math.sqrt(total*(vw/vh))*1.1);
    var col=i%cols,row=Math.floor(i/cols);
    var totalRows=Math.ceil(total/cols);
    var cW=(vw+80)/cols,cH=(vh-50)/totalRows;
    var w=cW*1.15,h=cH*1.02;
    var waveY=Math.sin((col/cols)*Math.PI*3+row*1.2)*18;
    var stagger=(row%2)*(cW*0.45);
    return{x:col*cW+stagger-40+(s1(i)-0.5)*6,y:row*cH+waveY+25+(s2(i)-0.5)*6,w:w,h:h,rot:Math.sin(col*0.6+row*0.4)*3.5};
  }
};

function applyLayout(name,stagger){
  currentLayout=name;
  var fn=layouts[name];
  cards.forEach(function(div,i){
    div.classList.add('go');
    div.classList.add('exploded');
    div.style.transitionDelay=stagger?(i*4)+'ms':'0ms';
    var p=fn(i);
    div.style.width=p.w+'px';
    div.style.height=p.h+'px';
    div.style.left=p.x+'px';
    div.style.top=p.y+'px';
    div.style.transform='rotate('+p.rot+'deg)';
    div.style.opacity='1';
  });
}

// First click/tap = explode
scene.addEventListener('click',function(){
  if(exploded)return;
  exploded=true;
  tapPrompt.classList.add('hidden');
  switcherEl.classList.add('show');
  readHint.classList.add('show');
  applyLayout(currentLayout,true);
});

// Switcher
document.querySelectorAll('.switcher button').forEach(function(btn){
  btn.addEventListener('click',function(e){
    e.preventDefault();
    e.stopPropagation();
    document.querySelectorAll('.switcher button').forEach(function(b){b.classList.remove('active');});
    this.classList.add('active');
    applyLayout(this.getAttribute('data-layout'),false);
  });
});
</script>
