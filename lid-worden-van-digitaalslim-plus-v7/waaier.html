<!DOCTYPE html>
<html lang="nl">

<meta charset="UTF-8">

<title>139 Testimonials - DigitaalSlim Plus+</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0A0814;
  min-height: 100vh;
  overflow: hidden;
  font-family: "Inter", -apple-system, sans-serif;
}

.switcher {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 99999;
  display: flex;
  gap: 6px;
  background: rgba(10,8,20,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 2px solid rgba(240,180,41,0.3);
  border-radius: 999px;
  padding: 5px;
}

.switcher button {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.5);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 24px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
  position: relative;
  z-index: 99999;
}

.switcher button:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.06); }

.switcher button.active {
  background: rgba(240,180,41,0.2);
  color: #F0B429;
  border: 1px solid rgba(240,180,41,0.3);
}

.scene {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.card {
  position: absolute;
  border-radius: 10px;
  box-shadow: 0 3px 16px rgba(0,0,0,0.25);
  overflow: hidden;
  cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.06);
  will-change: transform;
}

.card.animated {
  transition: left 0.9s cubic-bezier(0.34, 1.2, 0.64, 1),
              top 0.9s cubic-bezier(0.34, 1.2, 0.64, 1),
              width 0.9s cubic-bezier(0.34, 1.2, 0.64, 1),
              height 0.9s cubic-bezier(0.34, 1.2, 0.64, 1),
              transform 0.9s cubic-bezier(0.34, 1.2, 0.64, 1);
}

.card img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

/* Hover popup */
.popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 90000;
  background: rgba(10,8,20,0.7);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.popup-overlay.show { display: flex; }

.popup-overlay img {
  max-width: 85vw;
  max-height: 80vh;
  border-radius: 16px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 2px rgba(240,180,41,0.3);
  object-fit: contain;
}

.counter {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10000;
  text-align: center;
  pointer-events: none;
}

.counter-number {
  font-size: 80px;
  font-weight: 900;
  letter-spacing: -3px;
  line-height: 1;
  background: linear-gradient(135deg, #F0B429 0%, #FFD770 50%, #F0B429 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 12px rgba(240,180,41,0.3));
}

.counter-label {
  font-size: 15px;
  font-weight: 600;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="switcher" id="switcher">
  <button class="active" data-layout="spiral">Spiraal</button>
  <button data-layout="explosion">Explosie</button>
  <button data-layout="mosaic">Mozaiek</button>
  <button data-layout="wave">Golf</button>
</div>

<div class="scene" id="scene"></div>

<div class="popup-overlay" id="popup">
  <img id="popup-img" src="" alt="">
</div>

<div class="counter">
  <div class="counter-number">139</div>
  <div class="counter-label">tevreden leden vertellen hun verhaal</div>
</div>

var scene = document.getElementById('scene');
var popup = document.getElementById('popup');
var popupImg = document.getElementById('popup-img');
var total = files.length;
var vw = window.innerWidth;
var vh = window.innerHeight;
var cx = vw / 2;
var cy = vh / 2;

function s1(i) { var x = Math.sin(i * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }
function s2(i) { var x = Math.sin(i * 269.5 + 183.3) * 23421.6312; return x - Math.floor(x); }

// Click on card = popup full size
popup.addEventListener('click', function() { popup.classList.remove('show'); });

var cards = [];
files.forEach(function(file, i) {
  var div = document.createElement('div');
  div.className = 'card';
  var img = document.createElement('img');
  var src = 'afbeeldingen/Testimonials/' + encodeURIComponent(file);
  img.src = src;
  img.loading = 'lazy';
  div.appendChild(img);
  div.style.zIndex = i;
  div.addEventListener('click', function(e) {
    e.stopPropagation();
    popupImg.src = src;
    popup.classList.add('show');
  });
  scene.appendChild(div);
  cards.push(div);
});

var layouts = {

  spiral: function(i) {
    var angle = (i / total) * Math.PI * 7 + s1(i) * 0.3;
    var radius = 20 + (i / total) * (Math.min(vw, vh) * 0.47);
    var w = 190 + s1(i) * 70;
    var h = 65 + s1(i) * 30;
    return {
      x: cx + Math.cos(angle) * radius - w/2,
      y: cy + Math.sin(angle) * radius - h/2,
      w: w, h: h,
      rot: (angle * 180 / Math.PI) * 0.6 + (s1(i+50) - 0.5) * 25
    };
  },

  explosion: function(i) {
    var angle = s1(i) * Math.PI * 2;
    var dist = 40 + Math.pow(s2(i), 0.7) * (Math.min(vw, vh) * 0.5);
    var w = 150 + s1(i+10) * 110;
    var h = 55 + s1(i+10) * 40;
    return {
      x: cx + Math.cos(angle) * dist - w/2 + (s1(i+30)-0.5) * 60,
      y: cy + Math.sin(angle) * dist - h/2 + (s1(i+40)-0.5) * 60,
      w: w, h: h,
      rot: (s1(i+20) - 0.5) * 60
    };
  },

  mosaic: function(i) {
    var cols = Math.ceil(Math.sqrt(total * (vw/vh)));
    var rows = Math.ceil(total / cols);
    var col = i % cols;
    var row = Math.floor(i / cols);
    var cW = vw / cols;
    var cH = (vh - 60) / rows;
    var w = cW * 0.95;
    var h = cH * 0.92;
    return {
      x: col * cW + (cW - w)/2 + (s1(i) - 0.5) * cW * 0.12,
      y: row * cH + (cH - h)/2 + (s2(i) - 0.5) * cH * 0.12 + 30,
      w: w, h: h,
      rot: (s1(i+5) - 0.5) * 6
    };
  },

  wave: function(i) {
    var cols = 12;
    var col = i % cols;
    var row = Math.floor(i / cols);
    var totalRows = Math.ceil(total / cols);
    var cW = (vw + 100) / cols;
    var cH = (vh - 60) / totalRows;
    var w = cW * 1.2;
    var h = cH * 1.05;
    var waveY = Math.sin((col / cols) * Math.PI * 3 + row * 1.2) * 20;
    var stagger = (row % 2) * (cW * 0.45);
    return {
      x: col * cW + stagger - 50 + (s1(i)-0.5) * 8,
      y: row * cH + waveY + 30 + (s2(i)-0.5) * 8,
      w: w, h: h,
      rot: Math.sin(col * 0.6 + row * 0.4) * 4 + (s1(i+7)-0.5) * 3
    };
  }
};

function setLayout(name) {
  document.querySelectorAll('.switcher button').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-layout') === name);
  });
  var fn = layouts[name];
  cards.forEach(function(div, i) {
    var p = fn(i);
    div.style.width = p.w + 'px';
    div.style.height = p.h + 'px';
    div.style.left = p.x + 'px';
    div.style.top = p.y + 'px';
    div.style.transform = 'rotate(' + p.rot + 'deg)';
  });
  // Enable transition animations after initial render
  setTimeout(function() {
    cards.forEach(function(div) { div.classList.add('animated'); });
  }, 50);
}

document.querySelectorAll('.switcher button').forEach(function(btn) {
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    setLayout(this.getAttribute('data-layout'));
  });
});

setLayout('spiral');
</script>
